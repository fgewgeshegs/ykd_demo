spring:
  application:
    name: wechat-ilink

# iLink Bot 配置
ilink:
  bot:
    # HTTP 超时设置（毫秒）
    connect-timeout-ms: 35000
    read-timeout-ms: 35000
    write-timeout-ms: 35000
    # 重试设置
    http-max-retries: 3
    retry-base-delay-ms: 1000
    retry-max-delay-ms: 10000
    # 心跳
    heartbeat-enabled: true
    heartbeat-interval-ms: 30000
    # 消息轮询间隔（毫秒）
    poll-interval-ms: 1000
    # 天气查询城市（wttr.in 格式，拼音/英文）
    weather-city: Beijing
    # 固定回复模板（AI 失败时的降级方案，支持 {text} {time} {weather} 占位符）
    reply-template: "收到你的消息啦！\n你说：「{text}」\n\n⏰ 现在时间：{time}\n🌤️ 今日天气：{weather}\n\n🤖 这是 iLink Bot 的自动回复~"
    # 首次欢迎语
    welcome-message: "👋 你好！我是基于微信 iLink 协议的 Bot。\n\n目前我处于固定回复模式，会对你发的每条消息做出相同的回应。\n发送任意消息试试吧！"

    # AI 配置
    ai-enabled: true
    ai-api-key: sk-ccqomsmfdsj7c9vbjwfwo1r2d32cijizk1e761ckbbkvxrla
    ai-base-url: https://api.xiaomimimo.com/v1
    ai-model: mimo-v2.5-pro
    ai-system-prompt: "你是一个友好的微信助手，请用简洁自然的中文回复用户消息，不要使用 markdown 格式。"
    ai-max-tokens: 1024
